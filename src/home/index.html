<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySlots</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <span class="app-icon">&#9889;</span>
      <span class="app-title">StudySlots</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn tb-minimize" id="btn-minimize">&minus;</button>
      <button class="tb-btn tb-close" id="btn-close">&times;</button>
    </div>
  </div>

  <div class="container">
    <header class="hero">
      <h1 class="hero-title">Study<span class="accent">Slots</span></h1>
      <p class="hero-subtitle">Enfoca tu mente, gana tu recompensa</p>
    </header>

    <section class="glass-card config-card">
      <h2 class="card-title">
        <span class="card-icon">&#9201;</span>
        Configurar Sesi&oacute;n
      </h2>

      <div class="input-group">
        <label for="study-duration">Duraci&oacute;n de estudio (min)</label>
        <div class="stepper">
          <button class="step-btn" id="study-minus">−</button>
          <input type="number" id="study-duration" value="15" min="1" max="120">
          <button class="step-btn" id="study-plus">+</button>
        </div>
      </div>

      <div class="input-group">
        <label for="break-duration">Descanso (min)</label>
        <div class="stepper">
          <button class="step-btn" id="break-minus">−</button>
          <input type="number" id="break-duration" value="3" min="1" max="30">
          <button class="step-btn" id="break-plus">+</button>
        </div>
      </div>

      <button class="btn-start" id="btn-start">
        <span class="btn-glow"></span>
        <span class="btn-text">&#9654; Iniciar Estudio</span>
      </button>
    </section>

    <section class="glass-card sessions-card">
      <h2 class="card-title">
        <span class="card-icon">&#128203;</span>
        Sesiones Guardadas
      </h2>
      <div id="sessions-list" class="sessions-list">
        <div class="empty-state">No hay sesiones guardadas</div>
      </div>
      <button class="btn-save-session" id="btn-save">
        <span>+ Guardar sesi&oacute;n actual</span>
      </button>
    </section>

    <section class="glass-card stats-card">
      <h2 class="card-title">
        <span class="card-icon">&#127942;</span>
        Estad&iacute;sticas
      </h2>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-value" id="total-sessions">0</span>
          <span class="stat-label">Sesiones</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="total-minutes">0</span>
          <span class="stat-label">Minutos</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="streak">0</span>
          <span class="stat-label">Racha</span>
        </div>
      </div>
    </section>
  </div>

  <script src="home.js"></script>
</body>
</html>
