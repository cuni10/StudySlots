<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySlots Timer</title>
  <link rel="stylesheet" href="timer.css">
</head>
<body>
  <div class="timer-wrapper">
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#39FF14"/>
            <stop offset="100%" stop-color="#00ff88"/>
          </linearGradient>
        </defs>

        <circle class="ring-bg" cx="100" cy="100" r="88"
                fill="none" stroke="rgba(57,255,20,0.08)" stroke-width="6"/>

        <circle class="ring-progress" cx="100" cy="100" r="88"
                fill="none" stroke="url(#progressGrad)" stroke-width="6"
                stroke-linecap="round" filter="url(#glow)"
                transform="rotate(-90 100 100)"
                stroke-dasharray="553"
                stroke-dashoffset="0"/>

        <circle class="ring-glow" cx="100" cy="100" r="88"
                fill="none" stroke="var(--neon)" stroke-width="2"
                stroke-linecap="round"
                transform="rotate(-90 100 100)"
                stroke-dasharray="553"
                stroke-dashoffset="0"
                opacity="0.3"/>
      </svg>

      <div class="timer-center">
        <div class="time-display" id="time-display">15:00</div>
        <div class="time-label" id="time-label">Enfoque</div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="ctrl-btn" id="btn-pause" title="Pausar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-cancel" id="btn-cancel" title="Cancelar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="status-msg" id="status-msg"></div>
  </div>

  <script src="timer.js"></script>
  <script>
    const wrapper = document.querySelector('.timer-wrapper');
    let dragTimeout;
    wrapper.addEventListener('mousedown', () => {
      wrapper.classList.add('dragging');
      clearTimeout(dragTimeout);
    });
    document.addEventListener('mouseup', () => {
      dragTimeout = setTimeout(() => wrapper.classList.remove('dragging'), 300);
    });
  </script>
</body>
</html>
